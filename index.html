<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet someone tonight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --plum-deep: #2b1830;
    --coral: #ff6f61;
    --gold: #f2b263;
    --cream: #fbf3ec;
    --muted: rgba(251,243,236,0.72);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; height: 100%; color: var(--cream); }

  .backdrop {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.ibb.co/HT391bZG/99d2cf22ce50b40bdce97dd429bb69fc.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(8px);
    transform: scale(1.1);
    z-index: -1;
  }

  .content-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { max-width: 420px; width: 100%; text-align: center; background: rgba(0,0,0,0.6); padding: 40px; border-radius: 20px; }
  
  .eyebrow { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 18px; }
  h1 { font-family: 'Fraunces', serif; font-size: 42px; margin: 0 0 18px; }
  h1 em { font-style: italic; color: var(--coral); }
  p.lede { font-size: 16px; color: var(--muted); margin: 0 0 34px; }
  
  .cta { display: inline-block; width: 100%; padding: 17px 0; border-radius: 14px; background: linear-gradient(135deg, var(--coral), #ff8a75); color: #fff; font-weight: 700; text-decoration: none; }
  .fineprint { margin-top: 18px; font-size: 12.5px; color: rgba(251,243,236,0.5); }
</style>
</head>
<body>

  <div class="backdrop"></div>
  
  <div class="content-wrapper">
    <div class="card">
      <div class="eyebrow" id="eyebrow">Real people, nearby</div>
      <h1 id="headline">Someone in your city is <em>waiting</em> to meet you</h1>
      <p class="lede" id="lede">Free to browse, no bots, no gimmicks. Create a profile in under a minute and start chatting today.</p>
      <a class="cta" href="https://exclu18chats.name.ng/" id="ctaBtn">Click to continue</a>
      <div class="fineprint" id="fineprint">By continuing you'll be taken directly to the sign-up page for this offer. 18+.</div>
    </div>
  </div>

<script>
  // Language content mapping[cite: 1]
  const content = {
    en: { eyebrow: "Real people, nearby", headline: 'Someone in your city is <em>waiting</em> to meet you', lede: "Free to browse, no bots, no gimmicks. Create a profile in under a minute and start chatting today.", cta: "Click to continue", fine: "By continuing you'll be taken directly to the sign-up page for this offer. 18+." },
    pt: { eyebrow: "Pessoas reais, perto de você", headline: 'Alguém na sua cidade está <em>esperando</em> conhecer você', lede: "Grátis para navegar, sem bots nem truques. Crie um perfil em menos de um minuto e comece a conversar hoje.", cta: "Click to continue", fine: "Ao continuar, você será levado diretamente à página de cadastro desta oferta. 18+." },
    es: { eyebrow: "Gente real, cerca de ti", headline: 'Alguien en tu ciudad está <em>esperando</em> conocerte', lede: "Gratis para explorar, sin bots ni trucos. Crea tu perfil en menos de un minuto y empieza a chatear hoy.", cta: "Click to continue", fine: "Al continuar, irás directamente a la página de registro de esta oferta. Mayores de 18 años." }
  };

  // Country to Language mapping[cite: 1]
  const countryToLang = { MZ:'pt', PT:'pt', BR:'pt', AO:'pt', ES:'es', MX:'es', AR:'es' };

  function applyLanguage(langKey) {
    const c = content[langKey] || content.en;
    document.getElementById('eyebrow').textContent = c.eyebrow;
    document.getElementById('headline').innerHTML = c.headline;
    document.getElementById('lede').textContent = c.lede;
    document.getElementById('ctaBtn').textContent = c.cta;
    document.getElementById('fineprint').textContent = c.fine;
  }

  fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
      const lang = countryToLang[data && data.country_code] || 'en';
      applyLanguage(lang);
    })
    .catch(() => applyLanguage('en'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet someone tonight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --plum-deep: #2b1830;
    --plum-mid: #3d2145;
    --coral: #ff6f61;
    --gold: #f2b263;
    --cream: #fbf3ec;
    --muted: rgba(251,243,236,0.72);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    height: 100%;
  }

  .backdrop {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    /* Fundo com a imagem solicitada e desfoque */
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.ibb.co/0RWXZxSQ/91b77431c45815b415f11dcd1308330d.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(3px); /* Efeito de desfoque aplicado aqui */
    transform: scale(1.05); /* Para evitar bordas brancas pelo blur */
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
  }

  .content-wrapper {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .card {
    position: relative;
    max-width: 420px;
    width: 100%;
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 20px;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 42px;
    line-height: 1.08;
    margin: 0 0 18px;
    letter-spacing: -0.01em;
  }
  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--coral);
  }

  p.lede {
    font-size: 16px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 0 34px;
  }

  .cta {
    display: inline-block;
    width: 100%;
    padding: 17px 0;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--coral), #ff8a75);
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    box-shadow: 0 12px 30px rgba(255,111,97,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .cta:hover { transform: translateY(-1px); box-shadow: 0 16px 36px rgba(255,111,97,0.45); }
  .cta:active { transform: scale(0.98); }

  .fineprint {
    margin-top: 18px;
    font-size: 12.5px;
    color: rgba(251,243,236,0.5);
    line-height: 1.5;
  }
</style>
</head>
<body>

  <div class="backdrop"></div>
  
  <div class="content-wrapper">
    <div class="card">
      <div class="eyebrow">Real people, nearby</div>
      <h1>Someone in your city is <em>waiting</em> to meet you</h1>
      <p class="lede">Free to browse, no bots, no gimmicks. Create a profile in under a minute and start chatting today.</p>

      <a class="cta" href="https://exclu18chats.name.ng/" id="ctaBtn">Click to continue</a>

      <div class="fineprint">
        By continuing you'll be taken directly to the sign-up page for this offer. 18+.
      </div>
    </div>
  </div>

</body>
</html>

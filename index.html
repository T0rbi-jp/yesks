<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Age Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            /* Direct fallback background image and color in case CSS fails to load */
            background: #000 url('https://i.ibb.co/jd4z3QG/029bb41a0c4bbc1ac3c5a4e09b01cb1a.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Fullscreen absolute background element using the direct image link */
        .bg-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.5); /* Dims the image slightly so text is super clear */
        }

        /* Overlay Container */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 50px 30px;
            max-width: 600px;
            width: 90%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Large Text */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.1;
            letter-spacing: -1px;
            color: #ffffff;
        }

        p {
            font-size: 1.5rem;
            color: #e0e0e0;
            margin-bottom: 40px;
            line-height: 1.4;
            font-weight: 300;
        }

        /* Buttons */
        .button-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-yes {
            background-color: #ff2d55;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.4);
        }

        .btn-yes:hover {
            background-color: #ff1a45;
            transform: translateY(-2px);
        }

        .btn-no {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bg-no:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1.2rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- Direct Image Tag acting as the Background Layer -->
    <img src="https://i.ibb.co/jd4z3QG/029bb41a0c4bbc1ac3c5a4e09b01cb1a.jpg" class="bg-img" alt="Background Image">

    <div class="container">
        <h1>Welcome</h1>
        <p>You are about to see new girl videos and pictures in your area. Confirm that you are 18 years and above.</p>
        
        <div class="button-wrapper">
            <a href="https://0wdb.com/link?z=9970952&var={SOURCE_ID}&ymid={CLICK_ID}" class="btn btn-yes">Yes I am 18 +</a>
            <a href="https://0wdb.com/link?z=9970952&var={SOURCE_ID}&ymid={CLICK_ID}" class="btn btn-no">No, I am not</a>
        </div>
    </div>

</body>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Access</title>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; }
        .image-wrapper { position: relative; }
        .image-wrapper img { width: 100%; display: block; filter: brightness(70%); }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .play-icon::after { content: ''; border-left: 15px solid white; border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 4px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); }
        .modal { background: #fff; padding: 40px; border-radius: 25px; text-align: center; width: 85%; max-width: 450px; }
        h2 { font-size: 28px; margin-bottom: 20px; font-weight: 800; }
        p { font-size: 18px; margin-bottom: 40px; line-height: 1.5; color: #333; }
        .cta-button { display: block; background: #007bff; color: white; padding: 24px 0; text-decoration: none; border-radius: 15px; font-size: 26px; font-weight: 900; text-transform: uppercase; box-shadow: 0 6px 12px rgba(0,123,255,0.3); transition: transform 0.2s; }
        .cta-button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="google_translate_element" style="display:none;"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                autoDisplay: true,
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
            
            // This force-triggers the translation based on the user's browser language
            var a = document.querySelector("#google_translate_element select");
            if(a) {
                a.selectedIndex = 1;
                a.dispatchEvent(new Event('change'));
            }
        }
    </script>

    <div class="grid-container">
